<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevPulse — CI/CD with GitHub Actions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>⚡ DevPulse</h1>
      <p class="subtitle">CI/CD with GitHub Actions</p>
    </header>

    <main>
      <div class="card">
        <h2>Pipeline Status</h2>
        <p>Every push to main triggers the CI/CD pipeline automatically.</p>
      </div>
      <div class="card">
        <h2>How it works</h2>
        <p>1. Push code → 2. CI validates → 3. CD deploys to GitHub Pages</p>
      </div>
    </main>

    <footer>
      <p>DevPulse | CI/CD with GitHub Actions | <span id="build-info">local</span></p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
